<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1d211f">
  <meta name="description" content="Interactive evidence-first research defense for robust skin lesion segmentation.">
  <title>Evidence Before Leaderboards</title>
  <link rel="stylesheet" href="deck.css">
</head>
<body>
  <a class="skip-link" href="#deck">Skip to presentation</a>
  <main id="deck" class="deck" aria-live="polite" aria-busy="true">
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>
    <div id="slides" class="slides"></div>

    <nav class="controls" aria-label="Presentation controls">
      <button id="previous" class="control-button" type="button" aria-label="Previous slide">←</button>
      <button id="pipeline" class="control-button control-button-wide" type="button">Pipeline</button>
      <span id="counter" class="counter" aria-label="Current slide">01 / 12</span>
      <button id="notes-toggle" class="control-button control-button-wide" type="button" aria-expanded="false">Notes</button>
      <button id="next" class="control-button" type="button" aria-label="Next slide">→</button>
    </nav>

    <div class="progress" aria-hidden="true"><span id="progress-bar"></span></div>
  </main>

  <aside id="notes-panel" class="notes-panel" aria-label="Speaker notes" hidden>
    <div class="notes-header">
      <span>Speaker notes</span>
      <button id="notes-close" type="button">Close</button>
    </div>
    <ol id="notes-list"></ol>
  </aside>

  <div id="load-error" class="load-error" role="alert" hidden>
    <strong>Deck could not load.</strong>
    <span>Serve this directory over HTTP so the evidence contract can be read.</span>
  </div>

  <script src="deck.js" defer></script>
</body>
</html>
