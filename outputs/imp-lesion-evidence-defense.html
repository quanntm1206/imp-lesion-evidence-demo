<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1d211f">
  <meta name="description" content="Interactive evidence-first research defense for robust skin lesion segmentation.">
  <title>Evidence Before Leaderboards</title>
  <style>
:root {
  --ivory: #f4efe4;
  --ivory-deep: #e8dfcf;
  --ink: #1d211f;
  --ink-soft: #4b504d;
  --teal: #177d76;
  --teal-deep: #0f5f5a;
  --teal-pale: #dce9e3;
  --rust: #b54e36;
  --rust-deep: #823522;
  --rust-pale: #f0dcd5;
  --sage: #dde7df;
  --sand: #d8cfbf;
  --line: #c8bfae;
  --white: #fffdf8;
  --shadow: 0 24px 70px rgba(29, 33, 31, 0.18);
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --duration: 520ms;
  --headline: Georgia, "Times New Roman", serif;
  --body: "Trebuchet MS", Verdana, sans-serif;
}

* {
  box-sizing: border-box;
}

[hidden] {
  display: none !important;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background: #171a18;
  color: var(--ink);
  font-family: var(--body);
}

body {
  min-height: 100vh;
  overflow: hidden;
}

button,
a {
  font: inherit;
}

button:focus-visible,
a:focus-visible,
[tabindex="-1"]:focus-visible {
  outline: 3px solid var(--rust);
  outline-offset: 4px;
}

.skip-link {
  position: fixed;
  z-index: 100;
  top: 12px;
  left: 12px;
  transform: translateY(-180%);
  padding: 10px 16px;
  background: var(--white);
  color: var(--ink);
  border: 1px solid var(--ink);
}

.skip-link:focus {
  transform: translateY(0);
}

.deck {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background:
    linear-gradient(120deg, rgba(255, 253, 248, 0.76), rgba(244, 239, 228, 0.96)),
    repeating-linear-gradient(0deg, transparent 0 31px, rgba(29, 33, 31, 0.025) 31px 32px);
}

.ambient {
  position: absolute;
  border-radius: 50%;
  filter: blur(1px);
  opacity: 0.42;
  pointer-events: none;
}

.ambient-a {
  width: 42vw;
  height: 42vw;
  top: -28vw;
  right: -12vw;
  background: radial-gradient(circle, var(--teal-pale), transparent 70%);
}

.ambient-b {
  width: 34vw;
  height: 34vw;
  bottom: -24vw;
  left: -12vw;
  background: radial-gradient(circle, var(--rust-pale), transparent 70%);
}

.slides {
  position: absolute;
  inset: 0;
}

.slide {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: clamp(12px, 2vh, 24px);
  padding: clamp(34px, 6vh, 76px) clamp(34px, 6vw, 96px) clamp(76px, 10vh, 112px);
  opacity: 0;
  visibility: hidden;
  transform: translate3d(4.5%, 0, 0) scale(0.988);
  transition:
    opacity calc(var(--duration) * 0.8) ease,
    transform var(--duration) var(--ease),
    visibility 0s linear var(--duration);
  pointer-events: none;
}

.slide.is-before {
  transform: translate3d(-4.5%, 0, 0) scale(0.988);
}

.slide.is-active {
  opacity: 1;
  visibility: visible;
  transform: translate3d(0, 0, 0) scale(1);
  transition-delay: 0s;
  pointer-events: auto;
}

.slide.is-focus-entry .detail-stage {
  animation: focus-in var(--duration) var(--ease) both;
}

@keyframes focus-in {
  from {
    opacity: 0;
    transform: translate3d(var(--focus-offset, -18%), 6%, 0) scale(0.68);
    transform-origin: var(--focus-origin, 15% 50%);
  }
  to {
    opacity: 1;
    transform: none;
  }
}

.slide-header {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: start;
  gap: 32px;
  border-top: 2px solid var(--ink);
  padding-top: 12px;
}

.kicker {
  margin: 0 0 9px;
  color: var(--teal-deep);
  font-size: clamp(11px, 1vw, 15px);
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.slide-title {
  margin: 0;
  max-width: 1040px;
  font-family: var(--headline);
  font-size: clamp(31px, 4.15vw, 62px);
  font-weight: 500;
  line-height: 0.99;
  letter-spacing: -0.035em;
  text-wrap: balance;
}

.slide-number {
  color: var(--ink-soft);
  font-family: var(--headline);
  font-size: 18px;
  font-style: italic;
}

.slide-content {
  min-height: 0;
  display: grid;
  align-items: center;
}

.claim {
  margin: 0;
  max-width: 960px;
  font-family: var(--headline);
  font-size: clamp(21px, 2.3vw, 34px);
  line-height: 1.24;
  text-wrap: balance;
}

.body-list {
  display: grid;
  gap: 12px;
  margin: 24px 0 0;
  padding: 0;
  list-style: none;
  max-width: 980px;
}

.body-list li {
  position: relative;
  padding-left: 25px;
  color: var(--ink-soft);
  font-size: clamp(15px, 1.42vw, 21px);
  line-height: 1.38;
}

.body-list li::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0.62em;
  width: 13px;
  height: 2px;
  background: var(--teal);
}

.slide-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  min-height: 28px;
  color: var(--ink-soft);
  font-size: 12px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.evidence-label {
  display: inline-flex;
  gap: 8px;
  align-items: center;
}

.evidence-label::before {
  content: "";
  width: 9px;
  height: 9px;
  background: var(--teal);
  border-radius: 50%;
}

.non-clinical {
  color: var(--rust-deep);
  font-weight: 800;
}

.split-layout {
  display: grid;
  grid-template-columns: minmax(0, 0.9fr) minmax(380px, 1.1fr);
  gap: clamp(28px, 5vw, 76px);
  align-items: center;
  min-height: 0;
}

.metric-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 13px 24px;
}

.metric {
  border-top: 1px solid var(--line);
  padding-top: 10px;
}

.metric-value {
  display: block;
  font-family: var(--headline);
  font-size: clamp(34px, 4.6vw, 68px);
  line-height: 1;
  letter-spacing: -0.04em;
}

.metric-label {
  display: block;
  margin-top: 6px;
  color: var(--ink-soft);
  font-size: 13px;
  line-height: 1.2;
}

.metric.metric-negative .metric-value,
.metric.metric-negative .metric-label {
  color: var(--rust-deep);
}

.title-stage {
  display: grid;
  grid-template-columns: 1fr minmax(280px, 0.55fr);
  gap: 56px;
  align-items: center;
}

.title-lockup h1 {
  margin: 0;
  max-width: 900px;
  font-family: var(--headline);
  font-size: clamp(50px, 7vw, 104px);
  font-weight: 500;
  line-height: 0.9;
  letter-spacing: -0.055em;
  text-wrap: balance;
}

.title-lockup .title-subtitle {
  max-width: 780px;
  margin: 28px 0 0;
  color: var(--ink-soft);
  font-size: clamp(17px, 1.75vw, 25px);
  line-height: 1.35;
}

.title-mark {
  position: relative;
  aspect-ratio: 1;
  border: 1px solid var(--ink);
  border-radius: 50%;
}

.title-mark::before,
.title-mark::after {
  content: "";
  position: absolute;
  inset: 14%;
  border: 20px solid var(--teal);
  border-right-color: transparent;
  border-radius: 50%;
  transform: rotate(-24deg);
}

.title-mark::after {
  inset: 31%;
  border-width: 13px;
  border-color: var(--rust) transparent var(--rust) var(--rust);
  transform: rotate(74deg);
}

.title-meta {
  margin-top: 30px;
  display: flex;
  gap: 22px;
  color: var(--ink-soft);
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.contamination-stage {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(360px, 0.8fr);
  gap: 60px;
  align-items: center;
}

.contamination-map {
  position: relative;
  min-height: 290px;
  border: 1px solid var(--line);
  background:
    linear-gradient(135deg, transparent 48%, var(--rust) 48% 51%, transparent 51%),
    rgba(255, 253, 248, 0.45);
}

.contamination-map span {
  position: absolute;
  padding: 8px 12px;
  background: var(--rust-pale);
  color: var(--rust-deep);
  font-size: 13px;
  font-weight: 800;
}

.contamination-map span:nth-child(1) { top: 14%; left: 9%; }
.contamination-map span:nth-child(2) { top: 44%; left: 61%; }
.contamination-map span:nth-child(3) { top: 72%; left: 27%; }

.question-stage {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: stretch;
}

.question-column {
  padding: 26px 0;
  border-top: 5px solid var(--teal);
  border-bottom: 1px solid var(--line);
}

.question-column:last-child {
  border-top-color: var(--rust);
}

.question-index {
  display: block;
  margin-bottom: 18px;
  font-family: var(--headline);
  font-size: 42px;
  font-style: italic;
}

.question-column p {
  margin: 0;
  font-family: var(--headline);
  font-size: clamp(22px, 2.3vw, 34px);
  line-height: 1.25;
}

.pipeline-stage {
  display: grid;
  align-content: center;
  gap: 36px;
}

.pipeline-intro {
  display: flex;
  justify-content: space-between;
  gap: 30px;
  align-items: end;
}

.pipeline-intro .claim {
  max-width: 850px;
}

.pipeline-hint {
  color: var(--ink-soft);
  font-size: 13px;
  white-space: nowrap;
}

.pipeline-nodes,
.pipeline-breadcrumb {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  align-items: stretch;
  gap: 0;
}

.pipeline-node,
.breadcrumb-node {
  position: relative;
  min-height: 136px;
  padding: 22px 17px;
  border: 0;
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--line);
  background: transparent;
  color: var(--ink);
  text-align: left;
  cursor: pointer;
  transition: background 220ms ease, color 220ms ease, transform 220ms var(--ease);
}

.pipeline-node:not(:last-child)::after,
.breadcrumb-node:not(:last-child)::after {
  content: "→";
  position: absolute;
  right: -10px;
  top: 50%;
  z-index: 2;
  transform: translateY(-50%);
  width: 20px;
  text-align: center;
  color: var(--ink-soft);
}

.pipeline-node:hover,
.pipeline-node:focus-visible {
  z-index: 3;
  background: var(--ink);
  color: var(--ivory);
  transform: translateY(-7px);
}

.node-index {
  display: block;
  margin-bottom: 26px;
  font-family: var(--headline);
  font-size: 18px;
  font-style: italic;
}

.node-label {
  display: block;
  font-size: clamp(13px, 1.2vw, 17px);
  font-weight: 800;
  line-height: 1.12;
}

.detail-stage {
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 26px;
  min-height: 0;
}

.pipeline-breadcrumb {
  border-bottom: 1px solid var(--line);
}

.breadcrumb-node {
  min-height: 54px;
  padding: 10px 9px;
  border: 0;
  color: var(--ink-soft);
  font-size: 11px;
  font-weight: 700;
  cursor: default;
}

.breadcrumb-node.is-current {
  background: var(--ink);
  color: var(--ivory);
}

.back-pipeline {
  position: absolute;
  right: clamp(34px, 6vw, 96px);
  bottom: clamp(75px, 9vh, 102px);
  z-index: 5;
  padding: 9px 13px;
  border: 1px solid var(--ink);
  background: var(--ivory);
  color: var(--ink);
  cursor: pointer;
}

.back-pipeline:hover {
  background: var(--ink);
  color: var(--ivory);
}

.challenge-stage {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: clamp(18px, 2.5vw, 36px);
  align-items: stretch;
}

.challenge-card {
  display: grid;
  align-content: space-between;
  gap: 28px;
  min-height: min(38vh, 390px);
  padding: clamp(22px, 2.7vw, 38px);
  border-top: 5px solid var(--teal);
  border-bottom: 1px solid var(--line);
  background: rgba(255, 253, 248, 0.48);
}

.challenge-card:nth-child(2) {
  border-top-color: var(--ink);
}

.challenge-card:nth-child(3) {
  border-top-color: var(--rust);
}

.challenge-label {
  margin: 0;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.challenge-copy {
  margin: 0;
  font-family: var(--headline);
  font-size: clamp(21px, 2vw, 31px);
  line-height: 1.22;
}

.system-comparison {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 38px;
}

.system-lane {
  padding: 24px 0;
  border-top: 4px solid var(--teal);
}

.system-lane:last-child {
  border-top-color: var(--ink);
}

.system-lane h3 {
  margin: 0 0 17px;
  font-family: var(--headline);
  font-size: clamp(25px, 2.5vw, 37px);
  font-weight: 500;
}

.system-lane p {
  margin: 0;
  color: var(--ink-soft);
  font-size: clamp(15px, 1.35vw, 20px);
  line-height: 1.42;
}

.comparison-bars {
  display: grid;
  gap: 18px;
}

.comparison-row {
  display: grid;
  grid-template-columns: 170px 1fr 84px;
  gap: 16px;
  align-items: center;
}

.comparison-label,
.comparison-value {
  font-size: 14px;
  font-weight: 800;
}

.comparison-value {
  text-align: right;
  font-family: var(--headline);
  font-size: 24px;
}

.bar-track {
  height: 18px;
  background: var(--ivory-deep);
}

.bar-fill {
  height: 100%;
  background: var(--teal);
}

.bar-fill.is-dark {
  background: var(--ink);
}

.ablation-lanes {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 38px;
}

.ablation-lane {
  position: relative;
  min-height: 210px;
  padding: 26px;
  border: 1px solid var(--line);
  background: rgba(255, 253, 248, 0.44);
}

.ablation-lane.candidate {
  border-color: var(--rust);
}

.ablation-lane .channel {
  display: inline-block;
  margin: 8px 6px 0 0;
  padding: 8px 11px;
  background: var(--sage);
  font-size: 12px;
  font-weight: 800;
}

.ablation-lane.candidate .channel:last-child {
  background: var(--rust-pale);
  color: var(--rust-deep);
}

.figure-stage {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
  gap: 40px;
  align-items: center;
  min-height: 0;
}

.figure-stage img {
  width: 100%;
  max-height: 49vh;
  object-fit: contain;
  background: #fff;
  border: 1px solid var(--line);
}

.figure-caption {
  display: grid;
  gap: 18px;
}

.figure-caption .claim {
  font-size: clamp(20px, 2vw, 30px);
}

.demo-stage img {
  max-height: 47vh;
}

.demo-row-frame {
  width: 100%;
  height: min(34vh, 320px);
  overflow: hidden;
  border: 1px solid var(--line);
  background: #fff;
}

.demo-row-image {
  display: block;
  width: 100% !important;
  height: 100% !important;
  max-height: none !important;
  object-fit: cover;
  object-position: center 50%;
  border: 0 !important;
}

.demo-boundary {
  margin: 0;
  color: var(--rust-deep);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.01em;
}

.demo-action {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: fit-content;
  margin-top: 10px;
  padding: 13px 18px;
  border: 1px solid var(--ink);
  background: var(--ink);
  color: var(--ivory);
  text-decoration: none;
  font-weight: 800;
}

.demo-action:hover {
  background: var(--teal-deep);
}

.hash-chain {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  align-items: center;
}

.hash-step {
  position: relative;
  min-height: 125px;
  padding: 20px 16px;
  border-top: 4px solid var(--teal);
  background: rgba(255, 253, 248, 0.52);
}

.hash-step:not(:last-child)::after {
  content: "→";
  position: absolute;
  top: 43%;
  right: -18px;
  z-index: 2;
  font-size: 24px;
}

.hash-step strong {
  display: block;
  margin-bottom: 10px;
  font-family: var(--headline);
  font-size: 22px;
}

.hash-step span {
  color: var(--ink-soft);
  font-size: 13px;
  line-height: 1.35;
}

.conclusion-stage {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 60px;
  align-items: center;
}

.conclusion-stage .claim {
  font-size: clamp(28px, 3.7vw, 54px);
  line-height: 1.1;
}

.takeaway-list {
  border-left: 5px solid var(--rust);
  padding-left: 28px;
}

.takeaway-list li::before {
  background: var(--rust);
}

.controls {
  position: fixed;
  z-index: 30;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px;
  border: 1px solid rgba(244, 239, 228, 0.22);
  background: rgba(29, 33, 31, 0.94);
  box-shadow: var(--shadow);
}

.control-button {
  min-width: 42px;
  min-height: 38px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--ivory);
  cursor: pointer;
}

.control-button-wide {
  padding-inline: 12px;
}

.control-button:hover:not(:disabled),
.control-button:focus-visible {
  border-color: var(--ivory);
}

.control-button:disabled {
  opacity: 0.34;
  cursor: not-allowed;
}

.counter {
  min-width: 68px;
  color: var(--ivory-deep);
  text-align: center;
  font-size: 12px;
  letter-spacing: 0.08em;
}

.progress {
  position: fixed;
  z-index: 31;
  left: 0;
  right: 0;
  bottom: 0;
  height: 4px;
  background: rgba(29, 33, 31, 0.16);
}

.progress span {
  display: block;
  width: 0;
  height: 100%;
  background: var(--teal);
  transition: width 320ms var(--ease);
}

.notes-panel {
  position: fixed;
  z-index: 60;
  top: 0;
  right: 0;
  width: min(430px, 92vw);
  height: 100vh;
  overflow: auto;
  padding: 24px 28px;
  background: var(--ink);
  color: var(--ivory);
  box-shadow: -28px 0 70px rgba(0, 0, 0, 0.3);
}

.notes-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(244, 239, 228, 0.3);
  font-family: var(--headline);
  font-size: 24px;
}

.notes-header button {
  border: 1px solid var(--ivory);
  background: transparent;
  color: var(--ivory);
  padding: 7px 10px;
  cursor: pointer;
}

.notes-panel ol {
  display: grid;
  gap: 14px;
  padding-left: 21px;
  font-size: 16px;
  line-height: 1.48;
}

.load-error {
  position: fixed;
  z-index: 100;
  inset: 50% auto auto 50%;
  transform: translate(-50%, -50%);
  display: grid;
  gap: 8px;
  width: min(520px, 88vw);
  padding: 28px;
  border: 2px solid var(--rust);
  background: var(--ivory);
  box-shadow: var(--shadow);
}

@media (max-width: 860px) {
  body {
    overflow: auto;
  }

  .deck {
    min-height: 100svh;
    height: auto;
  }

  .slides {
    position: relative;
    min-height: 100svh;
  }

  .slide {
    position: absolute;
    min-height: 100svh;
    overflow-y: auto;
    padding: 24px 22px 96px;
  }

  .slide-header {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .slide-number {
    display: none;
  }

  .slide-title {
    font-size: clamp(30px, 9vw, 47px);
  }

  .split-layout,
  .title-stage,
  .contamination-stage,
  .question-stage,
  .figure-stage,
  .challenge-stage,
  .conclusion-stage {
    grid-template-columns: 1fr;
    gap: 25px;
  }

  .title-mark {
    display: none;
  }

  .title-lockup h1 {
    font-size: clamp(48px, 15vw, 76px);
  }

  .title-meta {
    flex-wrap: wrap;
  }

  .metric-grid {
    grid-template-columns: 1fr 1fr;
  }

  .pipeline-nodes {
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .pipeline-node {

    grid.append(item);
  }
  return grid;
}

function createHeader(slideData, index) {
  const header = element("header", "slide-header");
  const titleGroup = element("div", "");
  titleGroup.append(element("p", "kicker", slideData.kicker));
  const title = element("h2", "slide-title", slideData.title);
  title.id = `${slideData.id}-title`;
  title.tabIndex = -1;
  titleGroup.append(title);
  header.append(titleGroup);
  header.append(element("span", "slide-number", String(index + 1).padStart(2, "0")));
  return header;
}

function createFooter(slideData) {
  const footer = element("footer", "slide-footer");
  footer.append(element("span", "evidence-label", slideData.evidence_label));
  const notice = slideData.id === "s10-demo"
    ? state.content.meta.non_clinical_notice
    : "IMP | evidence-bounded research";
  footer.append(element("span", slideData.id === "s10-demo" ? "non-clinical" : "", notice));
  return footer;
}

function pipelineCurrentIds(slideId) {
  const direct = state.content.pipeline
    .filter((node) => node.target === slideId)
    .map((node) => node.id);
  if (slideId === "s09-negative-result") return ["loop206-ablation"];
  return direct;
}

function createBreadcrumb(slideId) {
  const currentIds = new Set(pipelineCurrentIds(slideId));
  const breadcrumb = element("div", "pipeline-breadcrumb");
  breadcrumb.setAttribute("aria-label", "Pipeline position");
  state.content.pipeline.forEach((node, index) => {
    const item = element(
      "span",
      `breadcrumb-node${currentIds.has(node.id) ? " is-current" : ""}`,
      `${String(index + 1).padStart(2, "0")} ${node.label}`,
    );
    breadcrumb.append(item);
  });
  return breadcrumb;
}

function createBackButton() {
  const button = element("button", "back-pipeline", "Back to Pipeline");
  button.type = "button";
  button.addEventListener("click", () => goToId("s04-pipeline"));
  return button;
}

function createTitleStage(slideData) {
  const stage = element("div", "title-stage");
  const lockup = element("div", "title-lockup");
  lockup.append(element("p", "kicker", slideData.kicker));
  const title = element("h1", "", slideData.title);
  title.id = `${slideData.id}-title`;
  title.tabIndex = -1;
  lockup.append(title);
  lockup.append(element("p", "title-subtitle", state.content.meta.subtitle));
  const meta = element("div", "title-meta");
  meta.append(element("span", "", state.content.meta.author));
  meta.append(element("span", "", state.content.meta.date));
  meta.append(element("span", "", `${state.content.meta.duration_minutes} minute defense`));
  lockup.append(meta);
  stage.append(lockup);
  stage.append(element("div", "title-mark"));
  return stage;
}

function createContaminationStage(slideData) {
  const stage = element("div", "contamination-stage");
  const copy = element("div", "");
  appendClaimAndBody(copy, slideData);
  copy.append(createMetricGrid(slideData.metrics));
  const map = element("div", "contamination-map");
  map.setAttribute("aria-label", "Legacy split boundaries crossed by identities");
  map.append(element("span", "", "patient A"));
  map.append(element("span", "", "patient B"));
  map.append(element("span", "", "patient C"));
  stage.append(copy, map);
  return stage;
}

function createQuestionStage(slideData) {
  const stage = element("div", "question-stage");
  const questions = [slideData.body[0], slideData.body[1]];
  questions.forEach((question, index) => {
    const column = element("section", "question-column");
    column.append(element("span", "question-index", `0${index + 1}`));
    column.append(element("p", "", question.replace(/^RQ[0-9]+: */, "")));
    stage.append(column);
  });
  return stage;
}

function createPipelineStage(slideData) {
  const stage = element("div", "pipeline-stage");
  const intro = element("div", "pipeline-intro");
  intro.append(element("p", "claim", slideData.claim));
  intro.append(element("span", "pipeline-hint", "Click a module | Esc returns here"));
  stage.append(intro);

  const nodes = element("div", "pipeline-nodes");
  state.content.pipeline.forEach((node, index) => {
    const button = element("button", "pipeline-node");
    button.type = "button";
    button.dataset.target = node.target;
    button.dataset.node = node.id;
    button.setAttribute("aria-label", `Open ${node.label} detail`);
    button.append(element("span", "node-index", String(index + 1).padStart(2, "0")));
    button.append(element("span", "node-label", node.label));
    button.addEventListener("click", () => {
      state.focusNode = node.id;
      goToId(node.target, { focusNode: node.id });
    });
    nodes.append(button);
  });
  stage.append(nodes);
  return stage;
}

function createDataStage(slideData) {
  const stage = element("div", "split-layout");
  const copy = element("div", "");
  appendClaimAndBody(copy, slideData);
  stage.append(copy, createMetricGrid(slideData.metrics));
  return stage;
}

function createModelsStage(slideData) {
  const stage = element("div", "detail-stage");
  stage.append(createBreadcrumb(slideData.id));
  const comparison = element("div", "system-comparison");
  const systems = [
    {
      title: "IMP - MiT-B3 U-Net",
      text: "384x384 | CLAHE + percentile stretch + median filter | fixed U-Net decoder",
    },
    {
      title: "nnU-Net v2",
      text: "256x256 | raw RGB | self-configuring plans, augmentation, loss, and inference",
    },
  ];
  systems.forEach((system) => {
    const lane = element("section", "system-lane");
    lane.append(element("h3", "", system.title));
    lane.append(element("p", "", system.text));
    comparison.append(lane);
  });
  stage.append(comparison);
  return stage;
}

function createValidationStage(slideData) {
  const stage = element("div", "detail-stage");
  stage.append(createBreadcrumb(slideData.id));
  const layout = element("div", "split-layout");
  const copy = element("div", "");
  appendClaimAndBody(copy, slideData);
  const bars = element("div", "comparison-bars");
  const rows = [
    ["MiT-B3 Dice", 0.8959, false],
    ["nnU-Net Dice", 0.9019, true],
    ["MiT-B3 BF1", 0.4145, false],
    ["nnU-Net BF1", 0.4369, true],
  ];
  rows.forEach(([label, value, dark]) => {
    const row = element("div", "comparison-row");
    row.append(element("span", "comparison-label", label));
    const track = element("div", "bar-track");
    const fill = element("div", `bar-fill${dark ? " is-dark" : ""}`);
    fill.style.width = `${Math.max(12, Number(value) * 100)}%`;
    track.append(fill);
    row.append(track, element("span", "comparison-value", Number(value).toFixed(4)));
    bars.append(row);
  });
  layout.append(copy, bars);
  stage.append(layout);
  return stage;
}

function createAblationStage(slideData) {
  const stage = element("div", "detail-stage");
  stage.append(createBreadcrumb(slideData.id));
  const layout = element("div", "split-layout");
  const copy = element("div", "");
  appendClaimAndBody(copy, slideData);
  const lanes = element("div", "ablation-lanes");
  const specs = [
    ["Zero-channel control", ["R", "G", "B", "0"], false],
    ["Contour-channel candidate", ["R", "G", "B", "locked contour"], true],
  ];
  specs.forEach(([label, channels, candidate]) => {
    const lane = element("section", `ablation-lane${candidate ? " candidate" : ""}`);
    lane.append(element("h3", "", label));
    for (const channel of channels) lane.append(element("span", "channel", channel));
    lanes.append(lane);
  });
  layout.append(copy, lanes);
  stage.append(layout);
  return stage;
}

function safeDemoUrl() {
  const configured = new URLSearchParams(window.location.search).get("demo")
    || state.content.meta.default_demo_url;
  try {
    const url = new URL(configured);
    if (!new Set(["http:", "https:"]).has(url.protocol)) throw new Error("unsupported protocol");
    return url.href;
  } catch (_error) {
    return state.content.meta.default_demo_url;
  }
}

function createChallengeStage(slideData) {
  const stage = element("div", "challenge-stage");
  const sections = [
    ["Problem", slideData.challenge.problem],
    ["Response", slideData.challenge.response],
    ["Remaining limitation", slideData.challenge.limitation],
  ];
  sections.forEach(([label, text]) => {
    const section = element("section", "challenge-card");
    section.append(element("h3", "challenge-label", label));
    section.append(element("p", "challenge-copy", text));
    stage.append(section);
  });
  return stage;
}

function createReproducibilityStage(slideData) {
  const stage = element("div", "split-layout");
  const copy = element("div", "");
  appendClaimAndBody(copy, slideData);
  const chain = element("div", "hash-chain");
  const steps = [
    ["Source reports", "Registry paths + SHA-256"],
    ["Evidence registry", "Classes + metric contracts"],
    ["Paper and demo", "Shared labels and values"],
    ["Clean CI", "Tables + audit + PDF"],
  ];
  steps.forEach(([title, text]) => {
    const step = element("div", "hash-step");
    step.append(element("strong", "", title), element("span", "", text));
    chain.append(step);
  });
  stage.append(copy, chain);
  return stage;
}

function createConclusionStage(slideData) {
  const stage = element("div", "conclusion-stage");
  stage.append(element("p", "claim", slideData.claim));
  appendBodyList(stage, slideData.body, "body-list takeaway-list");
  return stage;
}

function createGenericStage(slideData) {
  const stage = element("div", "split-layout");
  const copy = element("div", "");
  appendClaimAndBody(copy, slideData);
  stage.append(copy);
  if (slideData.metrics) stage.append(createMetricGrid(slideData.metrics));
  return stage;
}

function createStage(slideData) {
  const makers = {
    title: createTitleStage,
    contamination: createContaminationStage,
    questions: createQuestionStage,
    pipeline: createPipelineStage,
    data: createDataStage,
    models: createModelsStage,
    validation: createValidationStage,
    ablation: createAblationStage,
    "loop206-delta": createNegativeStage,
    "qualitative-demo": createDemoStage,
    "challenge": createChallengeStage,
    reproducibility: createReproducibilityStage,
    conclusion: createConclusionStage,
  };
  return (makers[slideData.visual] || createGenericStage)(slideData);
}

function renderSlides() {
  slidesRoot.replaceChildren();
  state.slides = state.content.slides.map((slideData, index) => {
    const article = element("article", "slide");
    article.id = slideData.id;
    article.dataset.index = String(index);
    article.setAttribute("aria-labelledby", `${slideData.id}-title`);
    article.setAttribute("aria-hidden", "true");

    if (slideData.visual !== "title") article.append(createHeader(slideData, index));
    const content = element("div", "slide-content");
    const stage = createStage(slideData);
    content.append(stage);
    article.append(content, createFooter(slideData));

    if (["s05-data", "s06-models", "s07-validation", "s08-ablation-design", "s09-negative-result", "s10-demo"].includes(slideData.id)) {
      article.append(createBackButton());
    }

    slidesRoot.append(article);
    return article;
  });
}

function indexForId(id) {
  return state.content.slides.findIndex((slide) => slide.id === id);
}

function currentData() {
  return state.content.slides[state.currentIndex];
}

function updateNotes() {
  notesList.replaceChildren();
  for (const note of currentData().notes) notesList.append(element("li", "", note));
}

function setNotesOpen(open) {
  state.notesOpen = open;
  notesPanel.hidden = !open;
  notesToggle.setAttribute("aria-expanded", String(open));
  if (open) updateNotes();
}

function goToId(id, options = {}) {
  const targetIndex = indexForId(id);
  if (targetIndex >= 0) showSlide(targetIndex, options);
}

function showSlide(targetIndex, options = {}) {
  const bounded = Math.max(0, Math.min(targetIndex, state.slides.length - 1));
  const oldIndex = state.currentIndex;
  const direction = bounded >= oldIndex ? 1 : -1;
  state.currentIndex = bounded;

  state.slides.forEach((slide, index) => {
    slide.classList.toggle("is-active", index === bounded);
    slide.classList.toggle("is-before", index < bounded);
    slide.classList.remove("is-focus-entry");
    slide.setAttribute("aria-hidden", String(index !== bounded));
  });

  const active = state.slides[bounded];
  if (options.focusNode) {
    active.classList.add("is-focus-entry");
    const nodeIndex = state.content.pipeline.findIndex((node) => node.id === options.focusNode);
    active.style.setProperty("--focus-origin", `${Math.max(5, nodeIndex * 17 + 8)}% 55%`);
    active.style.setProperty("--focus-offset", `${(nodeIndex - 2.5) * 7}%`);
  }

  previousButton.disabled = bounded === 0;
  nextButton.disabled = bounded === state.slides.length - 1;
  counter.textContent = `${String(bounded + 1).padStart(2, "0")} / ${String(state.slides.length).padStart(2, "0")}`;
  progressBar.style.width = `${((bounded + 1) / state.slides.length) * 100}%`;
  updateNotes();

  const id = currentData().id;
  if (window.location.hash !== `#${id}`) history.pushState(null, "", `#${id}`);
  const title = active.querySelector("h1, h2");
  window.setTimeout(() => title?.focus({ preventScroll: true }), 30);
  document.title = `${currentData().title} | Evidence Before Leaderboards`;
  window.dispatchEvent(new CustomEvent("deck:slidechange", { detail: { id, index: bounded, direction } }));
}

function stepPresenter(delta) {
  const currentId = currentData()?.id;
  const routeIndex = state.presenterRoute.indexOf(currentId);
  if (routeIndex < 0) {
    goToId(delta > 0 ? "s16-reproducibility" : "s10-demo");
    return;
  }
  const nextId = state.presenterRoute[routeIndex + delta];
  if (nextId) goToId(nextId);
}

function handleKey(event) {
  if (event.defaultPrevented || event.altKey || event.ctrlKey || event.metaKey) return;
  if (event.target instanceof HTMLAnchorElement || event.target instanceof HTMLButtonElement) {
    if (event.key === "Enter" || event.key === " ") return;
  }
  if (event.key === "ArrowRight" || event.key === "PageDown") {
    event.preventDefault();
    stepPresenter(1);
  } else if (event.key === "ArrowLeft" || event.key === "PageUp") {
    event.preventDefault();
    stepPresenter(-1);
  } else if (event.key === "Home") {
    event.preventDefault();
    showSlide(0);
  } else if (event.key === "End") {
    event.preventDefault();
    showSlide(state.slides.length - 1);
  } else if (event.key === "Escape") {
    event.preventDefault();
    if (state.notesOpen) setNotesOpen(false);
    else goToId("s04-pipeline");
  } else if (event.key.toLowerCase() === "n") {
    event.preventDefault();
    setNotesOpen(!state.notesOpen);
  } else if (event.key.toLowerCase() === "f") {
    event.preventDefault();
    if (!document.fullscreenElement) deckRoot.requestFullscreen?.();
    else document.exitFullscreen?.();
  }
}

function bindControls() {
  previousButton.addEventListener("click", () => stepPresenter(-1));
  nextButton.addEventListener("click", () => stepPresenter(1));
  pipelineButton.addEventListener("click", () => goToId("s04-pipeline"));
  notesToggle.addEventListener("click", () => setNotesOpen(!state.notesOpen));
  notesClose.addEventListener("click", () => setNotesOpen(false));
  document.addEventListener("keydown", handleKey);
  window.addEventListener("hashchange", () => {
    const target = window.location.hash.slice(1);
    const index = indexForId(target);
    if (index >= 0 && index !== state.currentIndex) showSlide(index);
  });
}

async function initialize() {
  try {
    const embeddedContent = document.getElementById("deck-content");
    if (embeddedContent?.textContent?.trim()) {
      state.content = JSON.parse(embeddedContent.textContent);
    } else {
      const response = await fetch("content.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`content request failed: ${response.status}`);
      state.content = await response.json();
    }
    const configuredRoute = state.content.meta?.presenter_route;
    state.presenterRoute = Array.isArray(configuredRoute) && configuredRoute.length
      ? configuredRoute
      : DEFAULT_PRESENTER_ROUTE;
    renderSlides();
    bindControls();
    const hashIndex = indexForId(window.location.hash.slice(1));
    state.currentIndex = hashIndex >= 0 ? hashIndex : 0;
    showSlide(state.currentIndex);
    deckRoot.setAttribute("aria-busy", "false");
    window.__deck = {
      goToId,
      currentId: () => currentData().id,
      slideCount: () => state.slides.length,
      pipelineTargets: () => state.content.pipeline.map((node) => node.target),
      presenterRoute: () => [...state.presenterRoute],
    };
  } catch (error) {
    console.error("presentation initialization failed", error);
    deckRoot.hidden = true;
    loadError.hidden = false;
  }
}

initialize();

</script>
</body>
</html>
