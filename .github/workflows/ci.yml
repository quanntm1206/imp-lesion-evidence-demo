name: CPU delivery checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CUDA_VISIBLE_DEVICES: ""
      UV_NO_PROGRESS: "1"
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Audit public repository surface
        run: python scripts/release/audit_public_surface.py --repo-root . --mode working-tree

      - name: Install pinned uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.12"
          enable-cache: true

      - name: Install CPU delivery dependencies
        run: uv sync --locked --python 3.12 --extra dev --extra analysis --extra demo

      - name: Install TeX and PDF inspection toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk poppler-utils texlive-bibtex-extra texlive-fonts-recommended \
            texlive-latex-base texlive-latex-extra

      - name: Run demo tests
        run: |
          mkdir -p ci-receipts
          uv run --no-sync --python 3.12 python -m pytest tests/demo -q --junitxml=ci-receipts/pytest.xml

      - name: Rebuild deterministic paper tables
        run: |
          uv run --no-sync --python 3.12 python scripts/paper/build_clean_v3_tables.py \
            --registry demo/data/evidence_registry.json \
            --paper-dir ci-receipts/generated-paper
          for table in evidence_scope.tex clean_v3_validation.tex loop206_ablation.tex legacy_loop170.tex; do
            cmp "ci-receipts/generated-paper/tables/${table}" "paper/clean_v3_loop206/tables/${table}"
          done
          git diff --exit-code -- paper/clean_v3_loop206/tables paper/clean_v3_loop206/artifact_manifest.json

      - name: Audit committed evidence-bound paper manifest
        run: |
          uv run --no-sync --python 3.12 python scripts/paper/audit_clean_v3_paper.py \
            --paper paper/clean_v3_loop206 \
            --registry demo/data/evidence_registry.json \
            --receipt ci-receipts/paper-audit.json \
            --source-verification registry-only

      - name: Clean-build paper and write receipt
        shell: bash
        run: |
          set -euo pipefail
          cd paper/clean_v3_loop206
          build_command='latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex'
          latexmk -C main.tex
          rm -f main.pdf
          $build_command | tee ../../ci-receipts/latex-build.log
          test -s main.pdf
          mkdir -p ../../ci-receipts/paper
          cp main.pdf ../../ci-receipts/paper/main.pdf
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          import re
          import subprocess

          pdf = Path("main.pdf")
          data = pdf.read_bytes()
          inspected = subprocess.run(
              ["pdfinfo", str(pdf)],
              check=True,
              capture_output=True,
              text=True,
          )
          pages = re.search(r"^Pages:\s+(\d+)\s*$", inspected.stdout, re.MULTILINE)
          if pages is None or int(pages.group(1)) < 1:
              raise RuntimeError("pdfinfo returned no valid page count")
          receipt = {
              "schema_version": "imp.ci_paper_build.v1",
              "workflow_commit_sha": os.environ["GITHUB_SHA"],
              "built_pdf_sha256": hashlib.sha256(data).hexdigest(),
              "pages": int(pages.group(1)),
              "bytes": len(data),
              "build_command": "latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex",
              "status": "passed",
          }
          artifact_manifest = {
              "schema_version": "imp.ci_paper_artifacts.v1",
              "workflow_commit_sha": os.environ["GITHUB_SHA"],
              "paper_pdf": {
                  "path": "main.pdf",
                  "sha256": receipt["built_pdf_sha256"],
                  "pages": receipt["pages"],
                  "bytes": receipt["bytes"],
              },
              "build_receipt_path": "../paper-build.json",
          }
          output = Path("../../ci-receipts/paper-build.json")
          output.write_text(json.dumps(receipt, indent=2, sort_keys=True) + "\n", encoding="ascii")
          manifest_output = Path("../../ci-receipts/paper/artifact_manifest.json")
          manifest_output.write_text(
              json.dumps(artifact_manifest, indent=2, sort_keys=True) + "\n",
              encoding="ascii",
          )
          PY

      - name: Upload paper and test receipts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: delivery-receipts
          if-no-files-found: error
          path: |
            ci-receipts/
            ci-receipts/paper/main.pdf
            ci-receipts/paper/artifact_manifest.json
