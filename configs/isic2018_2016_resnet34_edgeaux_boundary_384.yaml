project:
  name: robust-skin-lesion-segmentation-isic2018-2016-resnet34-edgeaux-boundary-384
  seed: 42

extends: configs/isic2018_resnet34_edgeaux_boundary_resume3_384.yaml

data:
  split_csv: data/splits/isic2018_plus_isic2016_train_split.csv
  image_size: [384, 384]

training:
  epochs: 200
  batch_size: 48
  learning_rate: 0.00001
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  amp: true
  init_checkpoint: runs/isic2018-resnet34-edgeaux-boundary-resume3-384-checkpoints/best.pt
  init_strict: true
  checkpoint_dir: runs/isic2018-2016-resnet34-edgeaux-boundary-384-checkpoints
  checkpoint_metric: val_dice
  checkpoint_mode: max
  save_last: true
  loss: edge_aux_bce_focal_tversky_boundary
  edge_aux_weight: 0.15
  edge_kernel_size: 3
  boundary_weight: 0.05
  boundary_kernel_size: 3
  scheduler:
    type: reduce_on_plateau
    factor: 0.5
    patience: 5
    min_lr: 0.000001
  early_stopping:
    enabled: true
    monitor: val_dice
    mode: max
    patience: 10
    min_delta: 0.0001
