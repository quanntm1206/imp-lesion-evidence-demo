project:
  name: robust-skin-lesion-segmentation-isic2018-2016-2017nl-segformer-mitb3-bdou-contrast-clahe-median-finetune-384
  seed: 42

extends: configs/isic2018_2016_2017nl_segformer_mitb3_bdou_finetune_384.yaml

# Loop-14 full-train recipe: use the retained Loop-10 preprocessing during training,
# not only evaluation. Keep SegFormer-b3 batch size inherited at 12 to avoid an
# unverified VRAM jump; apply the safest probed CPU DataLoader split for this SegFormer-b3 run.
preprocessing:
  normalize: true
  contrast_stretch:
    enabled: true
    lower_percentile: 1.0
    upper_percentile: 99.0
  clahe:
    enabled: true
    color_space: lab
    clip_limit: 2.0
    tile_grid_size: [8, 8]
  filter:
    type: median
    kernel_size: 3
  color_constancy:
    enabled: false
  gamma:
    enabled: false
  hair_removal:
    enabled: false
  sharpen:
    enabled: false
  extra_channel:
    enabled: false

data:
  cache:
    enabled: true
    root: /home/admin_mugen/imp_cache/dataset_resized/isic2018_2016_2017nl_384

training:
  num_workers: 4
  train_num_workers: 4
  val_num_workers: 0
  pin_memory: false
  persistent_workers: true
  train_persistent_workers: true
  val_persistent_workers: false
  prefetch_factor: 1
  train_prefetch_factor: 1
  val_prefetch_factor: 1
  checkpoint_dir: runs/isic2018-2016-2017nl-segformer-mitb3-bdou-contrast-clahe-median-finetune-w4v0cache-384-checkpoints
