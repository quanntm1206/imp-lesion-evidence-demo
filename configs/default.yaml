project:
  name: robust-skin-lesion-segmentation
  seed: 42

data:
  root: data/isic2018-task1
  images_dir: images
  masks_dir: masks
  image_size: [256, 256]
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  split_csv: data/splits/isic2018_split.csv

preprocessing:
  normalize: true
  clahe:
    enabled: false
    color_space: lab
    clip_limit: 2.0
    tile_grid_size: [8, 8]
  filter:
    type: none
    kernel_size: 3

model:
  name: unet
  in_channels: 3
  out_channels: 1
  base_channels: 32

training:
  device: cuda
  epochs: 50
  batch_size: 8
  learning_rate: 0.0001
  num_workers: 4
  loss: bce_dice
  checkpoint_dir: runs/checkpoints

postprocessing:
  threshold: 0.5
  close_kernel: 5
  fill_holes: true
  min_area_ratio: 0.005
  keep_largest: true

robustness:
  corruptions:
    low_brightness:
      factor: 0.6
    low_contrast:
      factor: 0.5
    gaussian_noise:
      sigma: 0.05
    gaussian_blur:
      kernel_size: 5
      sigma: 1.0
    jpeg_compression:
      quality: 40
