project:
  name: robust-skin-lesion-segmentation-isic2018-resnet34-edgeaux-boundary-resume3-384
  seed: 42

extends: configs/isic2018_resnet34_edgeaux_resume2_stable_384.yaml

training:
  epochs: 200
  batch_size: 48
  learning_rate: 0.00002
  num_workers: 4
  pin_memory: false
  persistent_workers: false
  prefetch_factor: 2
  init_checkpoint: runs/isic2018-resnet34-edgeaux-resume2-stable-384-checkpoints/best.pt
  init_strict: true
  loss: edge_aux_bce_focal_tversky_boundary
  edge_aux_weight: 0.15
  edge_kernel_size: 3
  boundary_weight: 0.05
  boundary_kernel_size: 3
  checkpoint_dir: runs/isic2018-resnet34-edgeaux-boundary-resume3-384-checkpoints
  scheduler:
    type: reduce_on_plateau
    factor: 0.5
    patience: 5
    min_lr: 0.000001
  early_stopping:
    enabled: true
    patience: 14
    min_delta: 0.0005
