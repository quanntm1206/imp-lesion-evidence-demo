project:
  name: robust-skin-lesion-segmentation-isic2018-resnet34-recall
  seed: 42

extends: configs/isic2018_unetpp_lowcontrast.yaml

model:
  name: resnet34_unet
  in_channels: 3
  out_channels: 1
  base_channels: 32
  encoder_weights: imagenet

training:
  device: cuda
  epochs: 200
  batch_size: 64
  learning_rate: 0.0003
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  amp: true
  loss: bce_focal_tversky
  tversky_alpha: 0.30
  tversky_beta: 0.70
  focal_gamma: 0.75
  bce_weight: 0.5
  focal_tversky_weight: 1.0
  checkpoint_dir: runs/isic2018-resnet34-recall-checkpoints
  scheduler:
    type: reduce_on_plateau
    factor: 0.5
    patience: 8
    min_lr: 0.000001
  early_stopping:
    enabled: true
    patience: 20
    min_delta: 0.0005
