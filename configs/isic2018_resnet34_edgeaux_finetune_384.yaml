project:
  name: robust-skin-lesion-segmentation-isic2018-resnet34-edgeaux-finetune-384
  seed: 42

extends: configs/isic2018_resnet34_recall_384.yaml

model:
  name: resnet34_unet_edge_aux
  in_channels: 3
  out_channels: 1
  base_channels: 32
  encoder_weights: imagenet
  edge_aux: true

training:
  epochs: 200
  batch_size: 48
  learning_rate: 0.00008
  init_checkpoint: runs/isic2018-resnet34-recall-384-checkpoints/best.pt
  init_strict: false
  loss: edge_aux_bce_focal_tversky
  edge_aux_weight: 0.20
  edge_kernel_size: 3
  checkpoint_dir: runs/isic2018-resnet34-edgeaux-finetune-384-checkpoints
  scheduler:
    type: reduce_on_plateau
    factor: 0.5
    patience: 5
    min_lr: 0.000001
  early_stopping:
    enabled: true
    patience: 14
    min_delta: 0.0005
