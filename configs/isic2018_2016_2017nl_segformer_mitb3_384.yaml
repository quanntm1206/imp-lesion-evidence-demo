project:
  name: robust-skin-lesion-segmentation-isic2018-2016-2017nl-segformer-mitb3-384
  seed: 42

extends: configs/isic2018_2016_segformer_mitb2_384.yaml

# Loop-7: larger SegFormer encoder (MiT-b3, ~45M) trained from ImageNet on the
# domain-diverse split (incl. leakage-safe ISIC2017). Biggest in-domain lever; GPU
# has headroom (b2 peaked ~4GB/16GB). Same recipe as b2 for a clean comparison.
model:
  name: segformer_mit
  smp_encoder: mit_b3
  in_channels: 3
  out_channels: 1
  encoder_weights: imagenet
  edge_aux: false

data:
  split_csv: data/splits/isic2018_2016_2017nl_train_split.csv

training:
  checkpoint_dir: runs/isic2018-2016-2017nl-segformer-mitb3-384-checkpoints
