project:
  name: robust-skin-lesion-segmentation-isic2018-2016-segformer-mitb2-384
  seed: 42

extends: configs/isic2018_2016_resnet34_edgeaux_boundary_384.yaml

# Loop-3 higher-tier member: SegFormer (MiT-b2) transformer encoder + U-Net decoder
# via segmentation_models_pytorch. Trained from ImageNet-pretrained encoder (no resnet
# init). Plain (B,1,H,W) logits -> tensor losses (no edge head). Adds a transformer global
# -context error mode to the CNN ensemble; goal = lift Boundary F1 / HD95 as a new member.
model:
  name: segformer_mit
  smp_encoder: mit_b2
  in_channels: 3
  out_channels: 1
  encoder_weights: imagenet
  edge_aux: false

training:
  loss: bce_focal_tversky_boundary
  boundary_weight: 0.05
  boundary_kernel_size: 3
  learning_rate: 0.00006
  batch_size: 12
  num_workers: 6
  pin_memory: false
  prefetch_factor: 1
  amp: true
  init_checkpoint: ""
  init_strict: false
  checkpoint_dir: runs/isic2018-2016-segformer-mitb2-384-checkpoints
  checkpoint_metric: val_dice
  checkpoint_mode: max
  save_last: true
  scheduler:
    type: reduce_on_plateau
    factor: 0.5
    patience: 5
    min_lr: 0.000001
  early_stopping:
    enabled: true
    monitor: val_dice
    mode: max
    patience: 10
    min_delta: 0.0001
